<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETRAAM LUXURY | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b59410; --black: #121212; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--white); color: var(--black); line-height: 1.6; }
        header { padding: 30px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 30px; letter-spacing: 10px; text-transform: uppercase; font-weight: 700; color: #000; text-decoration: none; }
        .container { max-width: 1200px; margin: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { border: 1px solid #f2f2f2; padding: 20px; text-align: center; background: #fff; position: relative; }
        .card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; background: #f9f9f9; }
        .card h3 { font-family: 'Playfair Display', serif; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .price { font-size: 20px; font-weight: 600; display: block; margin-bottom: 15px; color: #000; }
        
        .order-btn { 
            display: block; 
            width: 100%; 
            background: var(--black); 
            color: white; 
            text-decoration: none; 
            padding: 15px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 11px; 
            font-weight: 600;
            text-align: center;
        }
        .order-btn:hover { background: var(--gold); }
        .luxury-card { border: 2px solid var(--gold) !important; background: #fffdf7; }
        footer { text-align: center; padding: 50px; background: #121212; color: #fff; margin-top: 40px; font-size: 11px; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ETRAAM</a>
</header>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1594035910387-fea47734265f?auto=format&fit=crop&w=400">
        <h3>Noor-e-Ishq</h3>
        <span class="price">₹2,499</span>
        <a href="https://wa.me/917054157666?text=Hello%20Etraam,%20I%20want%20to%20order%20Noor-e-Ishq" target="_blank" class="order-btn">Order on WhatsApp</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=400">
        <h3>Etraam Classical</h3>
        <span class="price">₹2,199</span>
        <a href="https://wa.me/917054157666?text=Hello%20Etraam,%20I%20want%20to%20order%20Etraam%20Classical" target="_blank" class="order-btn">Order on WhatsApp</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?auto=format&fit=crop&w=400">
        <h3>Mehfooza-e-Ishq</h3>
        <span class="price">₹2,799</span>
        <a href="https://wa.me/917054157666?text=Hello%20Etraam,%20I%20want%20to%20order%20Mehfooza-e-Ishq" target="_blank" class="order-btn">Order on WhatsApp</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?auto=format&fit=crop&w=400">
        <h3>Etraam Original</h3>
        <span class="price">₹1,999</span>
        <a href="https://wa.me/917054157666?text=Hello%20Etraam,%20I%20want%20to%20order%20Etraam%20Original" target="_blank" class="order-btn">Order on WhatsApp</a>
    </div>

    <div class="card luxury-card">
        <img src="https://images.unsplash.com/photo-1595425970377-c9703cf48b6d?auto=format&fit=crop&w=400">
        <h3>Etraam Darbaar</h3>
        <span class="price">₹4,999</span>
        <a href="https://wa.me/917054157666?text=Hello%20Etraam,%20I%20want%20to%20order%20Etraam%20Darbaar%20Luxury" target="_blank" class="order-btn" style="background:var(--gold)">Order Luxury Edition</a>
    </div>
</div>

<footer>
    <p>ETRAAM LUXURY FRAGRANCE HOUSE</p>
    <p>Naveen Market, Kanpur | Brahm Nagar</p>
</footer>

</body>
</html>
