<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETRAAM LUXURY | Premium Fragrances</title>
    <style>
        :root { --gold: #b59410; --black: #1a1a1a; --gray: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', serif; }
        
        body { background: #fff; color: var(--black); line-height: 1.6; }
        
        /* Header & Navigation */
        header { padding: 20px 0; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 1000; text-align: center; }
        .logo { font-size: 35px; letter-spacing: 10px; font-weight: bold; text-transform: uppercase; text-decoration: none; color: #000; display: block; margin-bottom: 10px; }
        
        nav { display: flex; justify-content: center; gap: 20px; border-top: 1px solid #f9f9f9; padding-top: 10px; }
        nav a { text-decoration: none; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* Hero Section */
        .hero { padding: 80px 20px; text-align: center; background: #fafafa; border-bottom: 1px solid #eee; }
        .hero h1 { font-size: 45px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 15px; }
        .hero p { color: #888; letter-spacing: 1px; font-style: italic; }

        /* Category Sections */
        .section-title { text-align: center; padding: 60px 0 20px; text-transform: uppercase; letter-spacing: 5px; font-size: 24px; color: var(--black); position: relative; }
        .section-title::after { content: ''; display: block; width: 50px; height: 1px; background: var(--gold); margin: 15px auto; }

        .container { max-width: 1100px; margin: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        
        /* Product Card */
        .card { border: 1px solid #f0f0f0; padding: 15px; text-align: center; transition: 0.4s; background: #fff; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-color: var(--gold); }
        .card img { width: 100%; height: 320px; object-fit: cover; margin-bottom: 15px; background: var(--gray); }
        .card h3 { font-size: 18px; letter-spacing: 2px; margin-bottom: 5px; }
        .card .desc { font-size: 13px; color: #888; margin-bottom: 10px; height: 40px; }
        .price { color: var(--gold); font-size: 20px; margin: 10px 0; font-weight: bold; }

        /* Buttons */
        .order-btn { 
            background: var(--black); color: white; border: none; padding: 12px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; width: 100%; 
            font-size: 11px; transition: 0.3s;
        }
        .order-btn:hover { background: var(--gold); }

        footer { text-align: center; padding: 60px 20px; background: #1a1a1a; color: #fff; margin-top: 80px; }
        footer p { font-size: 12px; letter-spacing: 2px; opacity: 0.6; }
        
        html { scroll-behavior: smooth; }
    </style>
</head>
